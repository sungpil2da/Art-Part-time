<!-- 조형대학 근로학생 (요일별 · 상황별 · 월별 시간표) -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>조형대학 근로 데스크</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
  :root {
    --paper:#ECEEE8; --card:#FBFBF8; --ink:#1B1C1A; --muted:#6C6F68;
    --line:#DCDDD5; --line-strong:#C7C9BF;
    --am:#B0781E; --am-soft:#F4E9D4; --pm:#2E4374; --pm-soft:#E0E4EF;
    --sit:#2F6E5B; --sit-soft:#DCEAE3;
    --sch:#5A3E8C; --sch-soft:#E7E0F1;
    --done:#4C7A54; --danger:#A6483C;
    --radius:14px;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body { background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased; padding:22px 16px 64px; }
  .wrap { max-width:720px; margin:0 auto; }

  .hd { margin-bottom:16px; }
  .kicker { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 6px; }
  .title { font-size:clamp(24px,6vw,34px); font-weight:800; letter-spacing:-.02em; margin:0; }
  .datebar { display:flex; align-items:baseline; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .datebar .day { font-family:var(--mono); font-size:15px; font-weight:600; }
  .datebar .code { font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.1em; }

  .timeline { margin-top:16px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px 10px; }
  .tl-track { position:relative; height:26px; border-radius:7px; overflow:hidden; display:flex; border:1px solid var(--line-strong); }
  .tl-seg { height:100%; display:flex; align-items:center; padding-left:9px; }
  .tl-am { flex:5; background:var(--am-soft); } .tl-pm { flex:4; background:var(--pm-soft); }
  .tl-seg span { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.05em; }
  .tl-am span { color:var(--am); } .tl-pm span { color:var(--pm); }
  .tl-now { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink); }
  .tl-now::after { content:""; position:absolute; top:-4px; left:-3px; width:8px; height:8px; border-radius:50%; background:var(--ink); }
  .tl-ticks { display:flex; justify-content:space-between; margin-top:5px; }
  .tl-ticks span { font-family:var(--mono); font-size:10px; color:var(--muted); }

  .modeswitch { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; background:var(--card); border:1px solid var(--line-strong); border-radius:11px; padding:4px; margin:18px 0 4px; }
  .modeswitch button { appearance:none; border:0; background:transparent; cursor:pointer; font-family:var(--sans); font-size:14px; font-weight:700; color:var(--muted); padding:9px 0; border-radius:8px; transition:background .12s ease,color .12s ease; }
  .modeswitch button small { display:block; font-family:var(--mono); font-weight:500; font-size:9px; letter-spacing:.06em; margin-top:1px; opacity:.8; }
  .modeswitch button[aria-selected="true"] { background:var(--ink); color:var(--paper); }

  .tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:14px 0 6px; }
  .tab { appearance:none; border:1px solid var(--line-strong); background:var(--card); border-radius:10px; padding:9px 0 7px; cursor:pointer; text-align:center; font-family:var(--sans); color:var(--ink); transition:background .12s ease,border-color .12s ease; }
  .tab:hover { border-color:var(--ink); }
  .tab .kr { display:block; font-size:16px; font-weight:700; }
  .tab .en { display:block; font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:.1em; margin-top:1px; }
  .tab[aria-selected="true"] { background:var(--ink); border-color:var(--ink); }
  .tab[aria-selected="true"] .kr { color:var(--paper); }
  .tab[aria-selected="true"] .en { color:#B9BBB2; }
  .tab.today::after { content:"●"; display:block; font-size:6px; color:var(--am); margin-top:2px; line-height:1; }
  .tab[aria-selected="true"].today::after { color:#E8B24C; }

  .viewnote { font-size:12.5px; color:var(--muted); background:#E4E1D2; border:1px dashed var(--line-strong); border-radius:8px; padding:8px 11px; margin:4px 0 0; display:none; }
  .viewnote.show { display:block; }

  .sit-picker { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:7px; margin:14px 0 4px; }
  .sit-bar { display:flex; align-items:center; gap:10px; margin:14px 0 2px; }
  .sit-bar-label { font-size:13px; color:var(--muted); }
  .sit-bar .spacer { flex:1; }
  .sit-catbtn { appearance:none; border:1px solid var(--line-strong); background:transparent; border-radius:9px; padding:8px 12px; cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--muted); }
  .sit-catbtn:hover { border-color:var(--sit); color:var(--sit); }
  .sit-catbtn.active { background:var(--sit); color:#fff; border-color:var(--sit); }
  .sit-card.editing { display:flex; flex-direction:column; gap:6px; cursor:default; padding:9px 10px; }
  .sit-card.editing input { font-family:var(--sans); border:1px solid var(--line-strong); border-radius:7px; padding:6px 8px; background:#fff; color:var(--ink); }
  .sit-card.editing .sit-in-title { font-size:14px; font-weight:700; }
  .sit-card.editing .sit-in-hint { font-size:11.5px; }
  .sit-card.editing input:focus-visible { outline:2px solid var(--sit); outline-offset:1px; }
  .sit-catdel { appearance:none; border:0; background:transparent; color:var(--danger); font-family:var(--sans); font-size:12px; font-weight:700; cursor:pointer; align-self:flex-end; padding:2px 2px 0; }
  .sit-add { display:flex; align-items:center; justify-content:center; border:1px dashed var(--line-strong); background:transparent; color:var(--sit); font-family:var(--sans); font-weight:700; font-size:14px; cursor:pointer; min-height:56px; }
  .sit-add:hover { border-color:var(--sit); background:var(--sit-soft); }
  .sit-card { appearance:none; text-align:left; border:1px solid var(--line-strong); background:var(--card); border-radius:11px; padding:11px 12px; cursor:pointer; font-family:var(--sans); color:var(--ink); transition:border-color .12s ease,background .12s ease; }
  .sit-card:hover { border-color:var(--sit); }
  .sit-card .st { display:block; font-size:14.5px; font-weight:700; }
  .sit-card .sh { display:block; font-size:11px; color:var(--muted); margin-top:2px; }
  .sit-card[aria-selected="true"] { background:var(--sit); border-color:var(--sit); }
  .sit-card[aria-selected="true"] .st { color:#fff; }
  .sit-card[aria-selected="true"] .sh { color:#D6E6DE; }

  .panel { margin-top:16px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .p-hd { display:flex; align-items:center; gap:10px; padding:13px 15px; border-bottom:1px solid var(--line); }
  .p-dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
  .shift-am .p-dot { background:var(--am); } .shift-pm .p-dot { background:var(--pm); } .sit .p-dot { background:var(--sit); }
  .p-name { font-weight:800; font-size:16px; } .p-time { font-family:var(--mono); font-size:12px; color:var(--muted); } .p-hint { font-size:12px; color:var(--muted); }
  .p-hd .spacer { flex:1; }
  .count { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--muted); }
  .shift-am .count.full { color:var(--am); } .shift-pm .count.full { color:var(--pm); } .sit .count.full { color:var(--sit); }
  .editbtn { appearance:none; border:1px solid var(--line-strong); background:transparent; border-radius:8px; padding:5px 10px; cursor:pointer; font-family:var(--sans); font-size:12px; color:var(--muted); }
  .editbtn:hover { border-color:var(--ink); color:var(--ink); }
  .editbtn.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .progress { height:3px; background:var(--line); }
  .progress > i { display:block; height:100%; width:0; transition:width .3s ease; }
  .shift-am .progress > i { background:var(--am); } .shift-pm .progress > i { background:var(--pm); } .sit .progress > i { background:var(--sit); }

  ul.tasks { list-style:none; margin:0; padding:4px 0; }
  li.task { display:flex; align-items:flex-start; gap:11px; padding:10px 15px; border-bottom:1px solid var(--line); }
  li.task:last-child { border-bottom:0; }
  .stepno { flex:0 0 auto; font-family:var(--mono); font-size:11px; font-weight:700; color:var(--sit); background:var(--sit-soft); border-radius:5px; padding:2px 6px; margin-top:1px; min-width:22px; text-align:center; }
  .chk { appearance:none; flex:0 0 auto; margin:1px 0 0; width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line-strong); background:var(--card); cursor:pointer; position:relative; transition:all .12s ease; }
  .shift-am .chk:checked { background:var(--am); border-color:var(--am); } .shift-pm .chk:checked { background:var(--pm); border-color:var(--pm); } .sit .chk:checked { background:var(--sit); border-color:var(--sit); }
  .chk:checked::after { content:""; position:absolute; left:6px; top:2px; width:5px; height:10px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .chk:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
  .chk:disabled { cursor:not-allowed; opacity:.5; }
  .task-text { flex:1; font-size:14.5px; padding-top:1px; word-break:keep-all; }
  .task.checked .task-text { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--line-strong); }
  .task-input { flex:1; font-family:var(--sans); font-size:14.5px; color:var(--ink); border:1px solid var(--line-strong); border-radius:7px; padding:6px 9px; background:#fff; }
  .task-input:focus-visible { outline:2px solid var(--ink); outline-offset:1px; }
  .del { appearance:none; border:0; background:transparent; cursor:pointer; color:var(--danger); font-size:18px; line-height:1; padding:4px 6px; flex:0 0 auto; }
  .addrow { display:flex; gap:9px; padding:11px 15px; align-items:center; }
  .add-input { flex:1; font-family:var(--sans); font-size:14px; border:1px solid var(--line-strong); border-radius:8px; padding:8px 10px; background:#fff; }
  .add-input:focus-visible { outline:2px solid var(--ink); outline-offset:1px; }
  .addbtn { appearance:none; border:0; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:var(--sans); font-weight:700; font-size:13px; color:#fff; }
  .shift-am .addbtn { background:var(--am); } .shift-pm .addbtn { background:var(--pm); } .sit .addbtn { background:var(--sit); }
  .empty { padding:16px 15px; color:var(--muted); font-size:13.5px; }
  .panel-foot { display:flex; align-items:center; justify-content:space-between; padding:11px 15px; border-top:1px solid var(--line); gap:10px; }
  .foot-note { font-size:11.5px; color:var(--muted); }
  .reset { appearance:none; border:1px solid var(--line-strong); background:transparent; border-radius:8px; padding:7px 12px; cursor:pointer; font-family:var(--sans); font-size:12.5px; color:var(--muted); }
  .reset:hover { border-color:var(--danger); color:var(--danger); }
  .reset-day { margin:14px 0 0; }

  /* ---------- Schedule ---------- */
  .sch-bar { display:flex; align-items:center; gap:10px; margin:14px 0 10px; }
  .navbtn { appearance:none; border:1px solid var(--line-strong); background:var(--card); border-radius:9px; width:36px; height:36px; cursor:pointer; font-size:16px; color:var(--ink); line-height:1; }
  .navbtn:hover { border-color:var(--sch); color:var(--sch); }
  .sch-month { font-size:19px; font-weight:800; letter-spacing:-.01em; min-width:118px; text-align:center; }
  .sch-bar .spacer { flex:1; }
  .rosterbtn { appearance:none; border:1px solid var(--line-strong); background:transparent; border-radius:9px; padding:8px 12px; cursor:pointer; font-family:var(--sans); font-size:13px; font-weight:600; color:var(--muted); }
  .rosterbtn:hover { border-color:var(--sch); color:var(--sch); }
  .rosterbtn.active { background:var(--sch); color:#fff; border-color:var(--sch); }

  .legend { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .legend .chip { cursor:default; }
  .roster-edit { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:10px 12px; margin-bottom:12px; }
  .roster-row { display:flex; align-items:center; gap:8px; padding:5px 0; }
  .roster-row input[type="color"] { width:34px; height:30px; border:1px solid var(--line-strong); border-radius:7px; background:#fff; padding:2px; cursor:pointer; }
  .roster-row input[type="text"] { flex:1; font-family:var(--sans); font-size:14px; border:1px solid var(--line-strong); border-radius:8px; padding:7px 9px; background:#fff; color:var(--ink); }
  .raddbtn { appearance:none; border:0; border-radius:8px; padding:8px 14px; cursor:pointer; font-family:var(--sans); font-weight:700; font-size:13px; color:#fff; background:var(--sch); }

  .sch-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--radius); }
  .sch-week { min-width:600px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
  .sg-row { display:grid; grid-template-columns:46px repeat(5,1fr); }
  .sg-head { border-bottom:1px solid var(--line-strong); background:#F3F3EE; }
  .sg-head > div { padding:7px 6px; text-align:center; border-left:1px solid var(--line); }
  .sg-head > div:first-child { border-left:0; }
  .sg-wd { font-size:12px; font-weight:700; }
  .sg-wd.sat { color:#2E5AE8; } .sg-wd.hol { color:var(--danger); }
  .sg-date { font-family:var(--mono); font-size:11px; color:var(--muted); }
  .sg-date.out { opacity:.4; }
  .sg-date.today { color:var(--sch); font-weight:700; }
  .sg-body .sg-cell { border-left:1px solid var(--line); border-top:1px solid var(--line); padding:6px 5px; min-height:52px; cursor:pointer; transition:background .1s ease; }
  .sg-body .sg-cell:hover { background:var(--sch-soft); }
  .sg-body .sg-cell.today { background:#F4EEFA; }
  .sg-shiftlab { border-top:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); background:#F7F7F2; }
  .sg-am .sg-shiftlab { color:var(--am); } .sg-pm .sg-shiftlab { color:var(--pm); }
  .cell-chips { display:flex; flex-wrap:wrap; gap:3px; }
  .cell-empty { color:var(--line-strong); font-size:13px; }
  .cell-hol { grid-column:2 / -1; display:flex; align-items:center; justify-content:center; color:var(--danger); font-weight:700; font-size:13px; background:#FBEDEB; border-top:1px solid var(--line); }
  .sg-body .sg-cell.holcell { background:#FBEDEB; color:var(--danger); font-weight:700; font-size:12.5px; display:flex; align-items:center; justify-content:center; text-align:center; }
  .chip { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:2px 8px 2px 6px; font-size:12px; font-weight:600; border:1px solid var(--line); }
  .chip .cdot { width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .hint-tap { font-size:11.5px; color:var(--muted); margin:2px 2px 0; }

  /* ---------- Modal ---------- */
  .modal-bd { position:fixed; inset:0; background:rgba(20,20,18,.42); display:flex; align-items:center; justify-content:center; padding:18px; z-index:50; }
  .modal { background:var(--card); border-radius:16px; width:100%; max-width:400px; overflow:hidden; box-shadow:0 18px 50px rgba(0,0,0,.28); }
  .modal-hd { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line); }
  .modal-hd .mt { font-weight:800; font-size:16px; }
  .modal-hd .ms { font-family:var(--mono); font-size:12px; padding:2px 8px; border-radius:6px; }
  .modal-hd .ms.am { background:var(--am-soft); color:var(--am); } .modal-hd .ms.pm { background:var(--pm-soft); color:var(--pm); }
  .modal-hd .x { margin-left:auto; appearance:none; border:0; background:transparent; font-size:20px; cursor:pointer; color:var(--muted); line-height:1; }
  .modal-body { padding:14px 16px; }
  .modal-body .lbl { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .pick { display:flex; flex-wrap:wrap; gap:7px; }
  .pick .chip { cursor:pointer; opacity:.5; border:1px solid var(--line-strong); transition:opacity .1s ease; }
  .pick .chip.on { opacity:1; }
  .pick .chip.on::after { content:"✓"; font-size:11px; margin-left:1px; }
  .modal-foot { padding:12px 16px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .holbtn { appearance:none; border:1px solid var(--line-strong); background:transparent; border-radius:8px; padding:7px 12px; cursor:pointer; font-family:var(--sans); font-size:12.5px; color:var(--muted); }
  .holbtn.on { background:#FBEDEB; border-color:var(--danger); color:var(--danger); }
  .donebtn { appearance:none; border:0; border-radius:8px; background:var(--ink); color:var(--paper); padding:9px 18px; cursor:pointer; font-family:var(--sans); font-weight:700; font-size:13px; }

  /* ---------- Handover ---------- */
  .handover { margin-top:26px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .ho-hd { padding:13px 15px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px; }
  .ho-hd h2 { margin:0; font-size:16px; font-weight:800; }
  .ho-hd .shared { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.08em; border:1px solid var(--line-strong); border-radius:20px; padding:2px 8px; }
  .ho-form { padding:13px 15px; border-bottom:1px solid var(--line); }
  .ho-meta { display:flex; gap:9px; margin-bottom:9px; }
  .ho-name { flex:1; }
  .ho-name,.ho-shift { font-family:var(--sans); font-size:13px; border:1px solid var(--line-strong); border-radius:8px; padding:8px 10px; background:#fff; color:var(--ink); }
  .ho-text { width:100%; font-family:var(--sans); font-size:14px; color:var(--ink); border:1px solid var(--line-strong); border-radius:8px; padding:9px 11px; background:#fff; resize:vertical; min-height:62px; }
  .ho-name:focus-visible,.ho-shift:focus-visible,.ho-text:focus-visible { outline:2px solid var(--ink); outline-offset:1px; }
  .ho-submit { appearance:none; border:0; border-radius:8px; background:var(--ink); color:var(--paper); padding:9px 16px; cursor:pointer; font-family:var(--sans); font-weight:700; font-size:13px; margin-top:9px; }
  .ho-submit:hover { opacity:.9; }
  ul.ho-log { list-style:none; margin:0; padding:4px 0; }
  li.ho-item { padding:12px 15px; border-bottom:1px solid var(--line); }
  li.ho-item:last-child { border-bottom:0; }
  .ho-line { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
  .ho-tag { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.05em; border-radius:4px; padding:1px 6px; }
  .ho-tag.am { background:var(--am-soft); color:var(--am); } .ho-tag.pm { background:var(--pm-soft); color:var(--pm); } .ho-tag.etc { background:var(--line); color:var(--muted); }
  .ho-who { font-weight:700; font-size:13.5px; } .ho-ts { font-family:var(--mono); font-size:11px; color:var(--muted); margin-left:auto; }
  .ho-body { font-size:14px; white-space:pre-wrap; word-break:break-word; }
  .ho-x { appearance:none; border:0; background:transparent; color:var(--muted); cursor:pointer; font-size:12px; padding:2px 4px; }
  .ho-x:hover { color:var(--danger); }
  .ho-empty { padding:18px 15px; color:var(--muted); font-size:13.5px; }

  .foot { text-align:center; margin-top:26px; font-size:11.5px; color:var(--muted); line-height:1.7; }
  [hidden] { display:none !important; }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>

<div class="wrap">
  <header class="hd">
    <p class="kicker">조형대학 · 근로학생 데스크</p>
    <h1 class="title">근로 데스크</h1>
    <div class="datebar"><span class="day" id="todayText">—</span><span class="code" id="todayCode"></span></div>
    <div class="timeline" aria-label="근무 시간표">
      <div class="tl-track">
        <div class="tl-seg tl-am"><span>오전 09–14</span></div>
        <div class="tl-seg tl-pm"><span>오후 14–18</span></div>
        <div class="tl-now" id="tlNow" style="display:none"></div>
      </div>
      <div class="tl-ticks"><span>09</span><span>11</span><span>14</span><span>16</span><span>18</span></div>
    </div>
  </header>

  <div class="modeswitch" role="tablist" aria-label="모드">

  function renderHandover(){
    var log=document.getElementById("hoLog");
    if(!state.handover.length){ log.innerHTML='<li class="ho-empty">아직 인수인계가 없어요. 첫 메모를 남겨보세요.</li>'; return; }
    log.innerHTML="";
    state.handover.forEach(function(h){ var li=document.createElement("li"); li.className="ho-item"; var cls=h.shift==="am"?"am":h.shift==="pm"?"pm":"etc",txt=h.shift==="am"?"오전":h.shift==="pm"?"오후":"기타"; li.innerHTML='<div class="ho-line"><span class="ho-tag '+cls+'">'+txt+'</span><span class="ho-who">'+esc(h.name||"익명")+'</span><span class="ho-ts">'+h.ts+'</span><button class="ho-x" data-hx="'+h.id+'">삭제</button></div><div class="ho-body">'+esc(h.text)+'</div>'; log.appendChild(li); });
    log.querySelectorAll("[data-hx]").forEach(function(b){ b.addEventListener("click",function(){ state.handover=state.handover.filter(function(h){return h.id!==b.getAttribute("data-hx");}); sset("handover",JSON.stringify(state.handover)); renderHandover(); }); });
  }
  document.getElementById("hoSubmit").addEventListener("click",function(){
    var text=document.getElementById("hoText").value.trim(); if(!text){document.getElementById("hoText").focus();return;}
    var name=document.getElementById("hoName").value.trim(),shift=document.getElementById("hoShift").value,d=new Date();
    var ts=String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    state.handover.unshift({id:uid(),name:name,shift:shift,text:text,ts:ts});
    if(state.handover.length>60)state.handover=state.handover.slice(0,60);
    sset("handover",JSON.stringify(state.handover)); if(name)psetLS("myname",name);
    document.getElementById("hoText").value=""; renderHandover();
  });
  document.getElementById("hoShift").value=(now.getHours()<14)?"am":"pm";

  load();
})();
</script>
